<!DOCTYPE html>
<html>
<head>
    <title>Kitchen Panel Setup</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 0.75rem; margin: 1rem 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; padding: 0.75rem; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2563eb; }
        .hint { font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Connect to Main Server</h2>
        <p style="color: #cbd5e1; font-size: 0.9rem;">Please enter the IP Address of the Admin PC.</p>
        <input type="text" id="ipInput" placeholder="e.g. 192.168.1.5" />
        <button onclick="connect()">Connect to Kitchen Panel</button>
        <p class="hint">Make sure the Admin PC App is running and both PCs are on the same WiFi network.</p>
    </div>

    <script>
        // Check previous
        const saved = localStorage.getItem('__roms_server_ip');
        if (saved) document.getElementById('ipInput').value = saved;

        function connect() {
            let ip = document.getElementById('ipInput').value.trim();
            if (!ip) return alert('Please enter IP address');
            if (!ip.startsWith('http')) ip = 'http://' + ip;
            if (!ip.includes(':', 6)) ip = ip + ':3000'; // Default port
            
            localStorage.setItem('__roms_server_ip', ip);
            
            // Redirect electron window to the kitchen page
            window.location.href = ip;
        }
    </script>
</body>
</html>
