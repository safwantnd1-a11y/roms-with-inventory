<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROMS - Starting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f97316, #fb923c);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 0 40px rgba(249, 115, 22, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(249, 115, 22, 0.4); transform: scale(1); }
      50% { box-shadow: 0 0 60px rgba(249, 115, 22, 0.7); transform: scale(1.05); }
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    p.subtitle {
      color: #94a3b8;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      color: #64748b;
      font-size: 13px;
      margin-top: 16px;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo-icon">🍽️</div>
    <h1>Restaurant Order Management</h1>
    <p class="subtitle">ROMS &mdash; Professional Edition</p>
    <div class="spinner"></div>
    <p class="status">Starting server, please wait...</p>
  </div>
</body>
</html>
